openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Product storefront API with Telegram Stars checkout
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog
  - name: cart
    description: Cart management
  - name: orders
    description: Order management
  - name: reviews
    description: Product reviews
  - name: bot
    description: Telegram bot webhook
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products with optional category filter
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [phones, laptops, headsets, accessories]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /products/summary:
    get:
      operationId: getProductsSummary
      tags: [products]
      summary: Get catalog summary counts by category
      responses:
        "200":
          description: Category counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsSummary"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  /products/{id}/color:
    patch:
      operationId: updateProductColor
      tags: [products]
      summary: Update the selected color for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductColorUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Add a review to a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/{productId}:
    get:
      operationId: getProductReviews
      tags: [reviews]
      summary: Get reviews for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current cart contents
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/{itemId}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdate"
      responses:
        "200":
          description: Updated cart item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"
    delete:
      operationId: removeFromCart
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /cart/checkout:
    post:
      operationId: createCheckoutToken
      tags: [cart]
      summary: Create a checkout token for Telegram Stars payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "200":
          description: Checkout token and Telegram deep link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: sessionId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/simulate-payment:
    post:
      operationId: simulatePayment
      tags: [orders]
      summary: Create a fake paid order for demo purposes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulatePaymentRequest"
      responses:
        "201":
          description: Simulated paid order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/refund:
    post:
      operationId: refundOrder
      tags: [orders]
      summary: Refund a paid order via Telegram Stars
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Refunded order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Cannot refund
        "404":
          description: Not found

  /bot/webhook:
    post:
      operationId: telegramWebhook
      tags: [bot]
      summary: Telegram bot webhook endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramUpdate"
      responses:
        "200":
          description: OK

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Product:
      type: object
      required: [id, name, category, priceStars, imageUrl, colors, selectedColor]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
          enum: [phones, laptops, headsets, accessories]
        description:
          type: ["string", "null"]
        priceStars:
          type: integer
        imageUrl:
          type: string
        colors:
          type: array
          items:
            type: string
        selectedColor:
          type: string
        averageRating:
          type: ["number", "null"]
        reviewCount:
          type: integer

    ProductListResponse:
      type: object
      required: [products, total, page, limit]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ProductsSummary:
      type: object
      required: [total, byCategory]
      properties:
        total:
          type: integer
        byCategory:
          type: object
          properties:
            phones:
              type: integer
            laptops:
              type: integer
            headsets:
              type: integer
            accessories:
              type: integer

    ProductColorUpdate:
      type: object
      required: [color]
      properties:
        color:
          type: string

    Review:
      type: object
      required: [id, productId, author, rating, text, createdAt]
      properties:
        id:
          type: integer
        productId:
          type: integer
        author:
          type: string
        rating:
          type: integer
        text:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        createdAt:
          type: string

    ReviewInput:
      type: object
      required: [productId, author, rating, text]
      properties:
        productId:
          type: integer
        author:
          type: string
        rating:
          type: integer
        text:
          type: string
        imageUrls:
          type: array
          items:
            type: string

    CartItem:
      type: object
      required: [id, sessionId, productId, quantity, selectedColor, product]
      properties:
        id:
          type: integer
        sessionId:
          type: string
        productId:
          type: integer
        quantity:
          type: integer
        selectedColor:
          type: string
        product:
          $ref: "#/components/schemas/Product"

    Cart:
      type: object
      required: [items, totalStars, itemCount]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        totalStars:
          type: integer
        itemCount:
          type: integer

    CartItemInput:
      type: object
      required: [sessionId, productId, quantity, selectedColor]
      properties:
        sessionId:
          type: string
        productId:
          type: integer
        quantity:
          type: integer
        selectedColor:
          type: string

    CartItemUpdate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer

    CheckoutRequest:
      type: object
      required: [sessionId]
      properties:
        sessionId:
          type: string

    CheckoutResponse:
      type: object
      required: [token, telegramLink, totalStars]
      properties:
        token:
          type: string
        telegramLink:
          type: string
        totalStars:
          type: integer

    Order:
      type: object
      required: [id, sessionId, status, totalStars, createdAt, items]
      properties:
        id:
          type: integer
        sessionId:
          type: string
        status:
          type: string
          enum: [pending, paid, cancelled, refunded]
        totalStars:
          type: integer
        cartToken:
          type: ["string", "null"]
        telegramUserId:
          type: ["string", "null"]
        telegramPaymentChargeId:
          type: ["string", "null"]
        createdAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    SimulatePaymentRequest:
      type: object
      required: [sessionId]
      properties:
        sessionId:
          type: string

    OrderItem:
      type: object
      required: [id, orderId, productId, quantity, selectedColor, priceStars, product]
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        quantity:
          type: integer
        selectedColor:
          type: string
        priceStars:
          type: integer
        product:
          $ref: "#/components/schemas/Product"

    TelegramUpdate:
      type: object
      properties:
        update_id:
          type: integer
        message:
          type: object
        pre_checkout_query:
          type: object
        successful_payment:
          type: object
