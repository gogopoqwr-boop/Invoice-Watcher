kind = "web"
previewPath = "/"
title = "НА_УТРАХ_4 — Watch Configurator"
version = "1.0.0"
id = "artifacts/watch-configurator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24918

[services.development]
run = "pnpm --filter @workspace/watch-configurator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/watch-configurator", "run", "build" ]
publicDir = "artifacts/watch-configurator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24918"
BASE_PATH = "/"
