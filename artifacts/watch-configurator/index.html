    <script>
      (function () {
        function hidePill() {
          var el = document.getElementById('replit-pill');
          if (el) { el.style.cssText += 'display:none!important'; return true; }
          return false;
        }
        if (!hidePill()) {
          var obs = new MutationObserver(function () { if (hidePill()) obs.disconnect(); });
          obs.observe(document.documentElement, { childList: true, subtree: true });
        }
      })();
    </script>
